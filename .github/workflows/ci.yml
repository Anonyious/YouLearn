name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js with caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Generate Prisma client
      - name: Prisma Generate
        run: npx prisma generate

      # 5️⃣ Lint code (ESLint)
      - name: Lint
        run: npm run lint

      # 6️⃣ Type check (TypeScript)
      - name: Type check
        run: npm run typecheck

      # 7️⃣ Build project (Next.js)
      - name: Build
        run: npm run build